compaction_strategy:
  type: bentley_saxe
  rebuild_strategy: no_rebuild
levels:
  model:
    layers:
    - type: linear
      value: 256
    - type: relu
    train_params:
      threshold_samples: 1000
      batch_size: 256
      epochs: 3
      max_iters: 10
      retrain_strategy: no_retrain
    retrain_params:
      threshold_samples: 1000
      batch_size: 256
      epochs: 3
      max_iters: 10
      retrain_strategy: no_retrain
  bucket_size: 200
buffer_size: 200
input_shape: 768
arity: 3
device: cpu
distance_fn: dot
delete_method: oid_to_bucket