<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dynamic Index</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
  <div id="bucket-view" class="space-y-4 grid grid-cols-1 gap-4 w-full">
    <!-- Each level will be displayed as a separate row with its buckets -->
  </div>
  <div class="fixed top-4 right-4 min-w-64">
    <div class="mt-4 p-4 bg-gray-100 rounded shadow">
      <label for="event-limit" class="block text-sm font-medium text-gray-700 mb-1">
        Process N Events At a Time
      </label>
      <div class="flex space-x-2">
        <input id="event-limit" type="number" min="1" class="border p-2 rounded w-24" placeholder="e.g. 10">
        <button id="process-btn" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">
          Process Next
        </button>
        <button id="process-all-btn" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded">
          Process all
        </button>
      </div>
      <div id="queue-length" class="mt-4 text-sm text-gray-700">
      </div>
    </div>
    <div id="timing-view" class="mt-4 p-4 bg-gray-100 rounded shadow">
      <h2 class="text-xl font-semibold mb-2">Function Timings (avg)</h2>
      <div id="timing-list" class="space-y-2"></div>
    </div>
    <div id="metrics" class="p-4 space-y-2 bg-white rounded shadow w-full max-w-md">
      <h3 class="text-lg font-bold">Recall Metrics</h3>
      <div class="space-y-1">
        <div>
          <label class="block text-sm">Recall @1</label>
          <div class="h-4 bg-gray-200 rounded">
            <div id="recall1" class="h-4 bg-blue-500 rounded" style="width: 0%"></div>
          </div>
        </div>
        <div>
          <label class="block text-sm">Recall @5</label>
          <div class="h-4 bg-gray-200 rounded">
            <div id="recall5" class="h-4 bg-green-500 rounded" style="width: 0%"></div>
          </div>
        </div>
        <div>
          <label class="block text-sm">Recall @10</label>
          <div class="h-4 bg-gray-200 rounded">
            <div id="recall10" class="h-4 bg-purple-500 rounded" style="width: 0%"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
