name: Build and Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      features:
        description: "Features to enable when building"
        required: false
        default: "measure_time,tch"
        type: string

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Wheels
        uses: PyO3/maturin-action@v1
        env:
          LIBTORCH_USE_PYTORCH: "1"
        with:
          target: ${{ matrix.target }}
          # For Linux, this automatically uses a manylinux container
          # For macOS, it builds for the specific architecture
          args: --release --features ${{ github.event.inputs.features }} --manifest-path ./py_dynamic_learned_index/Cargo.toml
          sccache: "true"
          manylinux: auto

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: target/wheels/*.whl
          retention-days: 1

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build-wheels
    permissions:
      id-token: write # Required for Trusted Publishing
      contents: read

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true # Flattens the structure automatically

      - name: List wheels
        run: ls -R dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No password needed if Trusted Publishing is set up on PyPI
          packages-dir: dist/
          verbose: true
