name: Build and Publish to PyPI

on:
    workflow_dispatch:
        inputs:
            features:
                description: "Features to enable when building"
                required: false
                default: "measure_time,tch"
                type: string
    push:
        tags:
            - "v*"

jobs:
    build-wheels:
        name: Build wheels on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64
                    - os: macos-latest
                      target: x86_64
                    - os: macos-latest
                      target: aarch64

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Rust
              uses: actions-rs/toolchain@v1
              with:
                  toolchain: nightly
                  override: true

            - name: Set up Python
              uses: actions/setup-python@v4
              with:
                  python-version: "3.12"

            - name: Install UV
              run: curl -LsSf https://astral.sh/uv/install.sh | sh

            - name: Cache cargo dependencies
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-cargo-

            - name: Build wheels
              working-directory: ./py_dynamic_learned_index
              run: uv run maturin build --release --features ${{ inputs.features }} --skip-auditwheel

            - name: Upload wheel artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: wheels-${{ matrix.os }}-${{ matrix.target }}
                  path: target/wheels/
                  retention-days: 1

    publish-pypi:
        name: Publish to PyPI
        runs-on: ubuntu-latest
        needs: build-wheels
        permissions:
            contents: read
            id-token: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Download all wheel artifacts
              uses: actions/download-artifact@v4
              with:
                  path: dist
                  pattern: wheels-*

            - name: Flatten wheel directory structure
              run: |
                  mkdir -p final_dist
                  find dist -name "*.whl" -exec mv {} final_dist/ \;
                  ls -la final_dist/

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  packages-dir: final_dist/
                  verbose: true
