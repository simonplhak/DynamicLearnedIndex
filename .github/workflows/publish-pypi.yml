name: Build and Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      features:
        description: "Features to enable when building"
        required: false
        default: "measure_time,tch"
        type: string

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-24.04-arm
            target: aarch64
          - os: macos-latest
            target: x86_64
          - os: macos-latest
            target: aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install maturin and tools
        run: pip install maturin auditwheel

      - name: Install PyTorch (Linux)
        if: runner.os == 'Linux'
        run: pip install torch==2.6.0 --index-url https://download.pytorch.org/whl/cpu

      - name: Install PyTorch (macOS)
        if: runner.os == 'macOS'
        run: pip install torch==2.6.0

      - name: Build wheels
        if: runner.os == 'macOS'
        working-directory: ./py_dynamic_learned_index
        run: |
          export LIBTORCH_USE_PYTORCH=1
          export LIBTORCH_STATIC=0
          export CARGO_PROFILE_RELEASE_LTO=thin
          export CARGO_PROFILE_RELEASE_CODEGEN_UNITS=16
          export CARGO_PROFILE_RELEASE_STRIP=false
          if [ "${{ matrix.target }}" == "x86_64" ]; then
            export RUSTFLAGS="-C target-cpu=x86-64-v3"
            TARGET="x86_64-apple-darwin"
          else
            export RUSTFLAGS="-C target-cpu=apple-m1"
            TARGET="aarch64-apple-darwin"
          fi
          rustup target add $TARGET
          maturin build --target $TARGET --release --features ${{ github.event.inputs.features || 'measure_time,tch' }} --strip --no-default-features

      - name: Build wheels
        if: runner.os == 'Linux'
        working-directory: ./py_dynamic_learned_index
        run: |
          export LIBTORCH_USE_PYTORCH=1
          export LIBTORCH_STATIC=0
          export CARGO_PROFILE_RELEASE_LTO=thin
          export CARGO_PROFILE_RELEASE_CODEGEN_UNITS=16
          export CARGO_PROFILE_RELEASE_STRIP=false
          if [ "${{ matrix.target }}" == "x86_64" ]; then
            export RUSTFLAGS="-C target-cpu=x86-64-v3"
          else
            export RUSTFLAGS="-C target-cpu=generic"
          fi
          maturin build --release --features ${{ github.event.inputs.features || 'measure_time,tch' }} --strip --no-default-features --skip-auditwheel

      - name: Manually repair wheels (Linux only)
        if: runner.os == 'Linux'
        run: |
          mkdir -p target/repaired_wheels

          # Repair the wheel, explicitly excluding PyTorch's bulky shared libraries
          for whl in target/wheels/*.whl; do
            auditwheel repair "$whl" \
              --exclude libtorch.so \
              --exclude libtorch_cpu.so \
              --exclude libc10.so \
              --exclude libtorch_python.so \
              -w target/repaired_wheels
          done

          # Replace the original linux_x86_64 wheels with the repaired manylinux wheels
          rm target/wheels/*.whl
          mv target/repaired_wheels/*.whl target/wheels/

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: target/wheels/*.whl
          retention-days: 1

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        working-directory: ./py_dynamic_learned_index
        run: maturin sdist --out ../target/wheels

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: target/wheels/*.tar.gz
          retention-days: 1

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels, build-sdist]
    permissions:
      id-token: write # Required for Trusted Publishing
      contents: read

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true # Flattens the structure automatically

      - name: Clean dist directory
        # This ensures ONLY .whl and .tar.gz files are sent to PyPI,
        # removing any accidental logs or metadata.
        run: |
          find dist/ -type f ! -name "*.whl" ! -name "*.tar.gz" -delete
          ls -R dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No password needed if Trusted Publishing is set up on PyPI
          packages-dir: dist/
          verbose: true
          skip-existing: true
